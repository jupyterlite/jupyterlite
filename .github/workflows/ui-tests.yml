name: UI Tests

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

      - name: Install Python dependencies
        run: python -m pip install --group build

      - name: Install JS dependencies
        run: jlpm install

      - name: Build
        run: jlpm build:prod

      - name: Pack app
        run: jlpm pack:app

      - name: Install JupyterLite
        run: python -m pip install --group ui-tests ./py/jupyterlite-core[all]

      - name: Build JupyterLite
        run: |
          cd ui-tests
          jlpm

          # Build the JupyterLite website
          jlpm build

      - name: Upload the JupyterLite website
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-ui-tests-app-${{ github.run_number }}
          path: ./ui-tests/ui-tests-app

      - name: Upload the JupyterLite website (no content)
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-ui-tests-app-no-content-${{ github.run_number }}
          path: ./ui-tests/ui-tests-app-no-content

  ui-tests:
    needs: [build]
    name: Visual Regression
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, chromium]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: jupyterlite-ui-tests-app-${{ github.run_number }}
          path: ./ui-tests/ui-tests-app

      - uses: actions/download-artifact@v8
        with:
          name: jupyterlite-ui-tests-app-no-content-${{ github.run_number }}
          path: ./ui-tests/ui-tests-app-no-content

      - name: Install dependencies and browser
        run: |
          python -m pip install --upgrade pip
          # Install jupyter-builder to get jlpm
          python -m pip install --group build
          cd ui-tests
          jlpm
          jlpm playwright install

      - name: Test
        env:
          # Tag every test with the browser so the merged report can attribute results (see playwright.config.js).
          PLAYWRIGHT_TEST_TAG: '@${{ matrix.browser }}'
          # Unique blob filename per browser to avoid collisions when merging (see playwright.config.js).
          BLOB_FILENAME: report-${{ matrix.browser }}.zip
        run: |
          cd ui-tests
          jlpm run test --browser ${{ matrix.browser }}

      - name: Upload Playwright Test assets
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-${{ matrix.browser }}-test-assets
          path: |
            ui-tests/test-results

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-blobs-${{ matrix.browser }}
          path: ui-tests/blob-report
          retention-days: 1
          compression-level: 1

      - name: Update snapshots
        if: failure()
        run: |
          cd ui-tests
          # remove previous snapshots from other browser
          jlpm run clean:snapshots
          # generate new snapshots
          jlpm run test:update --browser ${{ matrix.browser }}

      - name: Upload updated snapshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-${{ matrix.browser }}-updated-snapshots
          path: ui-tests/test

  merge-reports:
    name: Merge UI Test Reports
    if: ${{ !cancelled() }}
    needs: ui-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout lockfile
        uses: actions/checkout@v6
        with:
          sparse-checkout: ui-tests/yarn.lock
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Find out Playwright version
        id: pw-version
        run: |
          set -e
          PW_VERSION=$(grep -m1 '^"playwright@npm:' ui-tests/yarn.lock | sed -E 's/^"playwright@npm:([^"]+)":/\1/')
          if ! [[ "$PW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Could not extract Playwright version from ui-tests/yarn.lock (got: '$PW_VERSION')" >&2
            exit 1
          fi
          echo "Playwright version: $PW_VERSION"
          echo "version=$PW_VERSION" >> $GITHUB_OUTPUT

      - name: Download blob artifacts
        uses: actions/download-artifact@v8
        with:
          path: blob-reports
          pattern: jupyterlite-blobs-*
          merge-multiple: true

      - name: Merge Playwright reports
        env:
          PW_VERSION: ${{ steps.pw-version.outputs.version }}
        run: |
          npx "playwright@$PW_VERSION" merge-reports --reporter html,github ./blob-reports/

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: jupyterlite-test-report
          path: playwright-report

      - name: Inline the report
        uses: jupyterlab/maintainer-tools/.github/actions/inline-playwright-report@v1
        with:
          path: playwright-report

      - name: Upload inlined report
        id: upload-report
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: jupyterlite-test-report-standalone
          path: playwright-report/output.html

      - name: Add report link to job summary
        env:
          REPORT_URL: ${{ steps.upload-report.outputs.artifact-url }}
        run: |
          echo "**[View UI Test Report]($REPORT_URL)**" >> $GITHUB_STEP_SUMMARY
